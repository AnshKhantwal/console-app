<div class="login-container">

<!-- Toast stack -->
<div class="toast-wrapper">
  <div
    *ngFor="let t of toasts"
    class="toast"
    [ngClass]="[t.type, t.hide ? 'toast-hide' : '']">

    <span>{{ t.message }}</span>

    <button class="toast-close" (click)="closeToast(t.id)">
      ✕
    </button>
  </div>
</div>


<!-- Loading Overlay -->
<!-- <div *ngIf="isLoading" class="loading-overlay">
  <div class="loader-card">
    <div class="spinner"></div>
    <p>Signing you in…</p>
  </div>
</div> -->

  <div class="login-card">

    <!-- Replace purple icon with LOGO -->
    <div class="brand">
      <div class="brand-logo">
        <img src="assets/images/tb-logo.png" alt="TB Clinic Logo" />
      </div>

      <h1>Medcross TB Clinic</h1>
      <p>Sign in to continue to your workspace</p>
    </div>

    <div class="login-form">

      <!-- USERNAME -->
      <div class="form-group">
        <label>Username</label>

        <div class="input-wrapper">
          <span class="icon">
            <!-- User Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" stroke="#6b7280" fill="none">
              <circle cx="12" cy="7" r="4"></circle>
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            </svg>
          </span>

          <input
            type="text"
            [(ngModel)]="username"
            placeholder="Enter username"
            (keyup.enter)="onLogin()"
            [disabled]="isLoading"
          />
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label>Password</label>

        <div class="input-wrapper password-wrapper">

          <span class="icon">
            <!-- Lock Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" stroke="#6b7280" fill="none">
              <rect x="4" y="10" width="16" height="10" rx="2"></rect>
              <path d="M8 10V7a4 4 0 1 1 8 0v3"></path>
            </svg>
          </span>

          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="Enter password"
            (keyup.enter)="onLogin()"
            [disabled]="isLoading"
          />

          <button type="button" class="toggle-password"
            (click)="showPassword = !showPassword">
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>

        </div>
      </div>

      <button class="login-btn" (click)="onLogin()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading">Signing in…</span>
      </button>

    </div>
  </div>
</div>
